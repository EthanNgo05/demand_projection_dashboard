[pytest]
# The app's importable code lives under src/ (dashboard, log_config, extract,
# agent, models). Put it on sys.path so `import dashboard`, `from agent ...`,
# etc. resolve. tests/conftest.py does the same insert for older pytest.
pythonpath = src


# The full-matrix parity suites (test_phase2_parity, test_phase6_full_parity)
# backtest every model across many views and take minutes to run. They are
# marked `slow` and skipped by default so a plain `pytest` stays fast; pass
# --runslow to include them (see tests/conftest.py).
markers =
    slow: long-running full-matrix parity tests (skipped unless --runslow)

# openpyxl warns "Workbook contains no default style" whenever it READS an .xlsx
# that was written without a style block — which the PowerBI demand export and
# the regional warehouse exports both are. It's harmless (openpyxl just applies
# its own default) and comes from a dependency, not our code, so silence just
# that one message. Every other warning stays visible.
filterwarnings =
    ignore:Workbook contains no default style:UserWarning
