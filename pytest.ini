[pytest]
# The full-matrix parity suites (test_phase2_parity, test_phase6_full_parity)
# backtest every model across many views and take minutes to run. They are
# marked `slow` and skipped by default so a plain `pytest` stays fast; pass
# --runslow to include them (see tests/conftest.py).
markers =
    slow: long-running full-matrix parity tests (skipped unless --runslow)
